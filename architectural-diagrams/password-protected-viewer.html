## High-Level Architecture

The Christephanie wedding system follows a modern serverless architecture with clear separation between frontend, API, and data layers.

### Core Components

**Frontend Layer**
- React 18 SPA with TypeScript
- Material-UI component library
- Recoil state management
- TanStack Query for server state
- Deployed via CloudFront + S3

**API Layer**
- AWS API Gateway HTTP API
- Lambda authorizer for JWT validation
- 25+ specialized Lambda functions
- RESTful API design

**Data Layer**
- DynamoDB for primary data storage
- S3 for file storage and static assets
- Parameter Store for configuration
- CloudWatch for logging and metrics

**External Integrations**
- Auth0 for authentication
- Stripe for payment processing
- Amazon SES for email delivery
- Twilio for SMS notifications
- USPS API for address validation

### Request Flow

1. **User Access**: Users access the React SPA via CloudFront CDN
2. **Authentication**: Auth0 provides JWT tokens for API access
3. **API Requests**: Frontend makes requests to API Gateway
4. **Authorization**: Lambda authorizer validates JWT tokens
5. **Business Logic**: Appropriate Lambda function processes the request
6. **Data Access**: Lambda functions interact with DynamoDB
7. **Response**: JSON responses returned to frontend
8. **UI Update**: React components update based on response

### Deployment Architecture

**Development Environment**
- dev.Christephanie.com
- Full feature testing
- Integration validation

**Production Environment**  
- Christephanie.com
- Live wedding system
- Performance monitoring

### Key Design Principles

- **Serverless-First**: Minimize operational overhead
- **Microservices**: Small, focused Lambda functions
- **API-First**: RESTful design with clear contracts
- **Mobile-First**: Responsive design for all devices
- **Security-First**: JWT authentication with RBAC
- **Performance-First**: Edge caching and optimization`,

## Service Overview

The Christephanie system leverages numerous AWS services for a fully managed, scalable infrastructure.

### Core AWS Services

**Compute & API**
- AWS Lambda (25+ functions)
- API Gateway HTTP API
- CloudFront CDN

**Storage & Database**
- DynamoDB (4 main tables)
- S3 (static hosting + file storage)
- Parameter Store (configuration)

**Security & Identity**
- IAM (roles and policies)
- Certificate Manager (SSL/TLS)
- Route 53 (DNS management)

**Monitoring & Operations**
- CloudWatch (logs and metrics)  
- X-Ray (distributed tracing)
- SNS (notifications)

### Infrastructure as Code

All infrastructure is defined using AWS CDK (TypeScript), organized into logical stacks:

**Certificate Stack**
- SSL/TLS certificates for domain
- Domain validation automation

**DNS Stack**
- Route 53 hosted zone
- DNS records for environments

**Database Stack**
- DynamoDB tables with GSI indexes
- Backup and recovery configuration

**Role Stack**
- IAM roles for Lambda functions
- Fine-grained permission policies

**Auth Stack**
- Lambda authorizer functions
- JWT validation logic

**API Stack**
- API Gateway configuration
- Lambda function integrations
- Route definitions

**Frontend Stack**
- S3 buckets for static hosting
- CloudFront distribution
- Cache configuration

### Environment Separation

**Development**
- dev.Christephanie.com
- api-dev.Christephanie.com
- Isolated resources with dev- prefix

**Production**
- Christephanie.com  
- api.Christephanie.com
- Production-optimized configuration

### Security Architecture

**Network Security**
- HTTPS-only communication
- CloudFront security headers
- API Gateway throttling

**Identity & Access**
- JWT-based authentication
- Role-based authorization
- Least-privilege IAM policies

**Data Security**
- DynamoDB encryption at rest
- S3 bucket policies
- Parameter Store encryption`,

## Lambda Function Organization

The backend consists of 25+ specialized Lambda functions organized by domain and responsibility.

### Architecture Pattern

**CQRS (Command Query Responsibility Segregation)**
- Commands: Write operations (Create, Update, Delete)
- Queries: Read operations (Get, Search, List)
- Separate models for reads and writes
- Optimized for specific use cases

### Domain Organization

**Admin Domain**
- FamilyUnit.Create: Family creation logic
- FamilyUnit.Update: Family modification
- FamilyUnit.Delete: Family removal
- FamilyUnit.Get: Family retrieval
- Configuration.Invitation: Design management
- Setup: Initial system setup

**Guest Domain**
- FamilyUnit.Get: Guest family data
- FamilyUnit.Update: Family information updates
- FamilyUnit.Patch: Partial updates
- Guest.Patch: Individual guest updates
- MaskedValues.Get: Privacy-protected data

**Payment Domain**
- Payments.Intent: Stripe payment creation
- Payments.Intent.Confirm: Webhook processing
- Payments.Contributions: Gift tracking

**Validation Domain**
- Validate.Address: USPS address validation
- Validate.Email: Email format validation
- Validate.Phone: Phone number validation
- Verify.Email: Email verification flow

**Utility Domain**
- Authorize: JWT validation
- Health: System health checks
- Stats.Get: Analytics and reporting
- Notify.Email: Email campaigns
- User functions: Find, Get, Patch

## RSVP User Journey

The RSVP process is the core user workflow in the wedding system.

### Step 1: Initial Access
1. User visits wedding website
2. CloudFront serves cached static assets
3. User enters invitation code
4. System queries guest database
5. Welcome message displayed with family details

### Step 2: Authentication
1. User clicks "Continue to RSVP"
2. Redirect to Auth0 authentication
3. JWT token issued upon successful login
4. Token stored in browser for API requests

### Step 3: RSVP Form Completion
1. Multi-step form with validation
2. Guest response collection
3. Dietary preferences and special requests
4. Real-time form validation

### Step 4: Submission & Confirmation
1. RSVP data sent to API with JWT
2. Lambda authorizer validates token
3. Business logic processes responses
4. Database updated with RSVP status
5. Confirmation email sent
6. UI updated with success message

## Admin Family Management

Administrators can manage family units and guest information.

### Bulk Family Import
1. Admin uploads CSV family data
2. File stored in S3 setup bucket
3. Admin.Setup Lambda processes CSV
4. Family records created in database
5. Invitation codes generated
6. Welcome emails sent to families

### Individual Family Management
1. Admin searches for specific family
2. Database queried by search terms
3. Family list displayed in admin interface
4. Admin edits family details
5. Changes validated and saved
6. Update notifications sent if needed

## Payment Processing Flow

Gift payments are processed through Stripe integration.

### Payment Initiation
1. User selects gift amount
2. Stripe payment form displayed
3. Payment method collected
4. Payment intent created via API
5. Client receives payment secret

### Payment Completion
1. Payment submitted to Stripe
2. Webhook confirms payment success
3. Payment status updated in database
4. Contribution record created
5. Thank you email sent
6. UI updated with confirmation

## Real-time Data Synchronization

The system maintains data consistency across concurrent users.

### Cache Management
- React Query cache with 5-minute stale time
- Background refetching for fresh data
- Optimistic updates for better UX
- Error handling with retry logic

### Concurrency Handling
- DynamoDB conditional writes
- Optimistic locking strategies
- Conflict resolution workflows
- User notification of conflicts

## Email Notification Pipeline

Various events trigger automated email notifications.

### Trigger Events
- RSVP submission completion
- Payment processing success
- Admin actions on family data
- System reminders and updates

### Processing Pipeline
1. Event captured by Lambda function
2. Appropriate email template selected
3. Personalization data gathered
4. Template rendered with dynamic content
5. Email sent via Amazon SES
6. Delivery status tracked
7. Email history logged to database`,

### 1. Authentication & Authorization Strategy

**Decision Rationale:**
- **Auth0 Choice**: Industry-standard OAuth 2.0 PKCE for enterprise-grade security without building custom auth
- **Custom Roles**: Database-stored roles enable complex wedding-specific permissions (family admin, guest, etc.)
- **Guest Access Pattern**: Last name + invitation code provides familiar, non-technical entry point
- **Multi-layered Security**: Auth0 → JWT → Custom Authorization → IAM provides defense in depth

### 2. Serverless Infrastructure Strategy

**Decision Rationale:**
- **Serverless Adoption**: Reduces operational complexity under tight timeline constraints
- **Lambda per Endpoint**: Microservices pattern enables independent deployment and scaling
- **Cost Optimization**: Pay-per-invocation model ideal for wedding traffic patterns (spikes around deadlines)
- **Built-in Reliability**: AWS-managed services provide 99.9% uptime with multi-AZ deployment

### 3. Data Architecture & Performance Strategy

**Decision Rationale:**
- **Single-Table DynamoDB**: Optimizes for query performance and reduces complexity
- **GSI Strategy**: Enables multiple access patterns without table scanning
- **Multi-Layer Caching**: CDN (static) → Backend (data) → Frontend (state) for <200ms response times
- **Warm Boot Strategy**: Pre-warmed Lambda functions for critical RSVP submission endpoints

### 4. Development & Operations Excellence

**Decision Rationale:**
- **TDD Approach**: 400+ unit tests ensure reliability under tight timeline pressure
- **Infrastructure as Code**: CDK with TypeScript provides type safety and version control
- **Environment Strategy**: Complete isolation prevents production issues during development
- **Zero-Downtime Deployments**: Blue/green deployment strategy maintains 99.9% uptime target

### Scalability Metrics

- **Geographic Distribution**: Global via CloudFront edge locations

### Reliability & Security

            if (event.key === 'Enter') {

            }
        }
        
        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            const errorDiv = document.getElementById('errorMessage');
            
            if (password === CORRECT_PASSWORD) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('contentContainer').style.display = 'block';
                localStorage.setItem('architectureAccess', 'granted');
                loadDocument('index');
            } else {
                errorDiv.textContent = 'Incorrect password. Please try again.';
                document.getElementById('passwordInput').value = '';
            }
        }
        
        function logout() {
            localStorage.removeItem('architectureAccess');
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('contentContainer').style.display = 'none';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMessage').textContent = '';
        }
        
        function loadDocument(docName, clickedButton = null) {
            currentDoc = docName;
            
            // Update URL parameter
            const url = new URL(window.location);
            url.searchParams.set('doc', docName);
            window.history.pushState({ doc: docName }, '', url);
            
            // Update navigation buttons - remove all active states first
            document.querySelectorAll('.nav-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Highlight the correct button
            if (clickedButton) {
                clickedButton.classList.add('active');
            } else {
                // Find the button that corresponds to this document
                const buttons = document.querySelectorAll('.nav-button');
                buttons.forEach(btn => {
                    const btnText = btn.textContent.toLowerCase();
                    if (btnText.includes('system overview') && docName === 'system-overview') {
                        btn.classList.add('active');
                    } else if (btnText.includes('design decisions') && docName === 'design-decisions') {
                        btn.classList.add('active');
                    } else if (btnText.includes('aws infrastructure') && docName === 'aws-infrastructure') {
                        btn.classList.add('active');
                    } else if (btnText.includes('frontend') && docName === 'frontend-architecture') {
                        btn.classList.add('active');
                    } else if (btnText.includes('backend') && docName === 'backend-architecture') {
                        btn.classList.add('active');
                    } else if (btnText.includes('data flow') && docName === 'data-flow') {
                        btn.classList.add('active');
                    } else if (btnText.includes('deployment') && docName === 'deployment-architecture') {
                        btn.classList.add('active');
                    }
                });
            }
            
            // Load and render document
            const content = documents[docName] || 'Document not found.';
            let html = marked.parse(content);
            
            // Convert mermaid code blocks to mermaid divs
            html = html.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g, 
                '<div class="mermaid">$1</div>');
            html = html.replace(/<pre><code>mermaid\s*([\s\S]*?)<\/code><\/pre>/g, 
                '<div class="mermaid">$1</div>');
            html = html.replace(/<code>```mermaid\s*([\s\S]*?)```<\/code>/g, 
                '<div class="mermaid">$1</div>');
            
            document.getElementById('documentContainer').innerHTML = html;
            
            // Initialize Mermaid for any diagrams - completely reinitialize
            if (typeof mermaid !== 'undefined') {
                // Remove any existing mermaid elements and reinitialize
                setTimeout(() => {
                    // Clear any existing mermaid rendered content
                    document.querySelectorAll('.mermaid[data-processed="true"]').forEach(el => {
                        el.removeAttribute('data-processed');
                        const svg = el.querySelector('svg');
                        if (svg) {
                            el.innerHTML = el.textContent || el.innerText || '';
                        }
                    });
                    
                    // Reinitialize mermaid
                    mermaid.init(undefined, document.querySelectorAll('.mermaid'));
                }, 200);
            }
        }
        
        // Handle browser back/forward buttons
        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.doc) {
                loadDocument(event.state.doc);
            }
        });
        
        // Auto-load content (password protection disabled)
        window.onload = function() {
            mermaid.initialize({
                startOnLoad: false,
                theme: 'default',
                flowchart: {
                    useMaxWidth: true,
                    htmlLabels: true
                },
                securityLevel: 'loose'
            });

            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('contentContainer').style.display = 'block';

            const urlParams = new URLSearchParams(window.location.search);
            const docParam = urlParams.get('doc');
            const docToLoad = docParam && documents[docParam] ? docParam : 'system-overview';

            loadDocument(docToLoad);
        };
    </script>
