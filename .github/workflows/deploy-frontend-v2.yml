name: Deploy Frontend (v2)

on:
  push:
    branches:
      - main.dev
      - main
    # Only run if files under frontend/src (or its subdirectories) have changed.
    paths:
      - 'frontend/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment (dev or prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      #force_deploy:
      #  description: "Force deploy flag (set true to deploy all projects)"
      #  required: false
      #  default: "false"
      #  type: boolean
        
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy Frontend to S3    
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || 'dev' }}  # <-- This ensures environment secrets load 
    
    steps:
      - name: Setup environment 
        run: | 
          echo "DEPLOY_ENV=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'prod') || 'dev' }}" >> $GITHUB_ENV
          #echo "FORCE_DEPLOY=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy || (github.ref == 'refs/heads/main' && 'true') || 'false' }}" >> $GITHUB_ENV
      
      - name: Debug Secrets & Vars
        run: |
          echo "DEPLOY_ENV: ${{ env.DEPLOY_ENV }}"
          if [[ -z "${{ secrets.DEV_AWS_ROLE_ARN }}" ]]; then echo "AWS Role is missing!"; else echo "AWS Role is set."; fi
      
      - name: Set AWS Role ARN
        run: |
          if [ "${{ env.DEPLOY_ENV }}" = "prod" ]; then
            echo "Using PROD Role ARN"
            echo "AWS_ROLE=${{ secrets.PROD_AWS_ROLE_ARN }}" >> $GITHUB_ENV
          else
            echo "Using DEV Role ARN"
            echo "AWS_ROLE=${{ secrets.DEV_AWS_ROLE_ARN }}" >> $GITHUB_ENV
          fi
        
      - name: Testing env variables
        run: | 
          echo "AWS_ROLE: ${{ vars.DEV_AWS_ROLE_ARN }}"
          
      - name: Reset OIDC Token
        run: rm -rf ~/.aws/
          
      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: "${{ env.AWS_ROLE }}"
          role-session-name: GitHubActionsSession
          aws-region: us-east-1
          
      #role-to-assume: arn:aws:iam::390403858788:role/GitHubActionsDeployRole
      #role-to-assume: "${{ env.DEPLOY_ENV == 'prod' && secrets.PROD_AWS_ROLE_ARN || secrets.DEV_AWS_ROLE_ARN }}"
                
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: yarn

      - name: Install Dependencies
        run: yarn install
        working-directory: frontend/src

      - name: Build React App
        run: yarn build
        working-directory: frontend/src
        env:
          DOMAIN: "${{ env.DEPLOY_ENV == 'prod' && secrets.PROD_AUTH0_DOMAIN || secrets.DEV_AUTH0_DOMAIN }}"
          CLIENT_ID: "${{ env.DEPLOY_ENV == 'prod' && secrets.PROD_AUTH0_CLIENT_ID || secrets.DEV_AUTH0_CLIENT_ID }}"
          AUDIENCE: "${{ env.DEPLOY_ENV == 'prod' && vars.PROD_AUDIENCE || vars.DEV_AUDIENCE }}"
          WEBSERVICE_URL: "${{ env.DEPLOY_ENV == 'prod' && vars.PROD_WEBSERVICE_URL || vars.DEV_WEBSERVICE_URL }}"
          FORCE_DEPLOY: "${{ env.FORCE_DEPLOY }}"

      - name: Set S3 Bucket Name
        run: |
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
            echo "S3_BUCKET=${{ vars.PROD_S3_BUCKET }}" >> $GITHUB_ENV
          else
            echo "S3_BUCKET=${{ vars.DEV_S3_BUCKET }}" >> $GITHUB_ENV
          fi

      - name: Deploy to S3
        run: aws s3 sync frontend/src/build s3://$S3_BUCKET --delete

      - name: Invalidate CloudFront Cache (if using CloudFront)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ github.event.inputs.environment == 'prod' && secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID || secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
