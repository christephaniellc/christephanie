name: Deploy Frontend

on:
  push:
    branches:
      - main.dev
      - main
    # Only run if files under frontend/src (or its subdirectories) have changed.
    paths:
      - 'frontend/src/**'
  workflow_dispatch:
    inputs:
      deploy_env:
        description: "Deployment environment (dev or prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      force_deploy:
        description: "Force deploy flag (set true to deploy all projects)"
        required: false
        default: "false"
        type: boolean

jobs:
  deploy:
    name: Build & Deploy Frontend to S3
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_env || (github.ref == 'refs/heads/main' && 'prod') || 'dev' }}
      FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_deploy || (github.ref == 'refs/heads/main' && 'true') || 'false' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      - name: Build React App
        run: npm run build
        working-directory: frontend
        env:
          DOMAIN: "${{ env.DEPLOY_ENV == 'prod' && secrets.PROD_AUTH0_DOMAIN || secrets.DEV_AUTH0_DOMAIN }}"
          CLIENT_ID: "${{ env.DEPLOY_ENV == 'prod' && secrets.PROD_AUTH0_CLIENT_ID || secrets.DEV_AUTH0_CLIENT_ID }}"
          AUDIENCE: "${{ env.DEPLOY_ENV == 'prod' && vars.PROD_AUDIENCE || vars.DEV_AUDIENCE }}"
          WEBSERVICE_URL: "${{ env.DEPLOY_ENV == 'prod' && vars.PROD_WEBSERVICE_URL || vars.DEV_WEBSERVICE_URL }}"
          FORCE_DEPLOY: "${{ env.FORCE_DEPLOY }}"

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: "${{ env.DEPLOY_ENV == 'prod' && secrets.PROD_AWS_ROLE_ARN || secrets.DEV_AWS_ROLE_ARN }}"
          role-session-name: GitHubActionsSession
          aws-region: us-east-1

      - name: Set S3 Bucket Name
        run: |
          if [ "${{ env.DEPLOY_ENV }}" = "prod" ]; then
            echo "S3_BUCKET=${{ vars.PROD_S3_BUCKET }}" >> $GITHUB_ENV
          else
            echo "S3_BUCKET=${{ vars.DEV_S3_BUCKET }}" >> $GITHUB_ENV
          fi

      - name: Deploy to S3
        run: aws s3 sync frontend/build s3://$S3_BUCKET --delete

      - name: Invalidate CloudFront Cache (if using CloudFront)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.DEPLOY_ENV == 'prod' && secrets.PROD_CLOUDFRONT_DISTRIBUTION_ID || secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"
