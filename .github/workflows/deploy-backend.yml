name: Deploy Backend Lambdas

on:
  push:
    branches:
      - main.dev
      - main
    # Only run if files under backend/src (or its subdirectories) have changed.
    paths:
      - 'backend/src/**'
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment (dev or prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      force_deploy:
        description: "Deploy all Wedding.Lambdas projects (excluding unittests)?"
        required: false
        default: "false"
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build & Deploy Backend Lambdas
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Setup AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::390403858788:role/GitHubActionsDeployRole
          role-session-name: GitHubActionsSession
          aws-region: us-east-1

      - name: Determine Lambda Projects to Deploy
        id: changes
        run: |
          echo "Determining deployment mode..."

          # Set default branch based on environment
          if [[ "${{ github.event.inputs.environment }}" == "prod" ]]; then
            branch="main"
            force_deploy=true  # Always deploy everything in prod
          else
            branch="main.dev"
            force_deploy="${{ github.event.inputs.force_deploy }}"
          fi

          echo "Deploying to environment: ${{ github.event.inputs.environment }}"
          echo "Watching branch: $branch"
          echo "Force deploy: $force_deploy"

          # Ensure full Git history is available
          git fetch --prune --unshallow

          # Detect Lambda project changes
          if [[ "$force_deploy" == "true" ]]; then
            echo "Force deploy enabled: Deploying all Wedding.Lambdas projects."
            dirs=$(find backend/src -maxdepth 1 -mindepth 1 -type d -name "Wedding.Lambdas.*" | grep -i -v -E "(unittests|tests)" | xargs -n 1 basename)
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              previous_commit="HEAD~1"
            else
              previous_commit=$(git rev-list --max-parents=0 HEAD)
            fi

            changed_dirs=$(git diff --name-only $previous_commit HEAD backend/src | grep "Wedding.Lambdas." | cut -d'/' -f3 | sort -u | grep -i -v -E "(unittests|tests)" || true)

            # Detect Wedding.Common and Wedding.Abstractions changes
            common_changed=$(git diff --name-only $previous_commit HEAD backend/src/Wedding.Common/ || true)
            abstractions_changed=$(git diff --name-only $previous_commit HEAD backend/src/Wedding.Abstractions/ || true)

            if [[ -n "$abstractions_changed" ]]; then
              echo "Wedding.Abstractions changed, deploying all Lambdas..."
              dirs=$(find backend/src -maxdepth 1 -mindepth 1 -type d -name "Wedding.Lambdas.*" | grep -i -v -E "(unittests|tests)" | xargs -n 1 basename)
              changed_dirs=$(echo "$dirs")
              echo "Found lambda directories: $dirs"
            elif [[ -n "$common_changed" ]]; then
              echo "Wedding.Common changed, deploying all dependent Lambdas..."
              dependent_lambdas=$(grep -rl "Wedding.Common" backend/src/Wedding.Lambdas.*/*.csproj | cut -d'/' -f3 | sort -u)
              changed_dirs="$changed_dirs $dependent_lambdas"
              echo "Found changed lambda directories: $changed_dirs"
            fi
          fi

          # Remove duplicates
          dirs=$(echo "$changed_dirs" | tr ' ' '\n' | sort -u | tr '\n' ' ')
          echo "Lambda directories to deploy after removing dupes: $dirs"

          if [[ -z "$dirs" ]]; then
            echo "No Lambda changes detected. Skipping deployment."
            echo "deploy=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "Lambdas to deploy: $dirs"
          echo "deploy=true" >> $GITHUB_ENV
          echo "dirs=$dirs" >> $GITHUB_ENV
          echo "branch=$branch" >> $GITHUB_ENV

      - name: Build & Deploy Lambda Functions
        if: env.deploy == 'true'
        run: |
          application_name="christephanie-wedding-api"

          for dir in $dirs; do
            full_path="backend/src/$dir"
            base_name=$(basename "$full_path" | sed 's/^Wedding\.Lambdas\.//')
            function_name="${application_name}-$(echo "$base_name" | tr '.' '-' | tr '[:upper:]' '[:lower:]')"

            echo "Building $function_name"
            dotnet publish "$full_path" -c Release -o "$full_path/bin/publish"

            echo "Packaging Lambda (excluding .pdb files): $function_name"
            cd "$full_path/bin/publish" || exit 1
            zip -r "../$function_name.zip" . -x "*.pdb"
            cd - || exit 1

            echo "Updating Lambda: $function_name"
            aws lambda update-function-code \
              --function-name "$function_name" \
              --zip-file "fileb://$full_path/bin/$function_name.zip"
          done

      - name: Build API project
        run: dotnet build backend/src/Wedding.PublicApi --configuration Release --no-restore
                 
      - name: Generate Swagger JSON
        run: |
          dotnet tool install --global Swashbuckle.AspNetCore.Cli
          swagger tofile --output backend/src/swagger.json backend/src/Wedding.PublicApi/bin/Release/net8.0/Wedding.PublicApi.dll v1

      - name: Commit & Push Swagger JSON
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/src/swagger.json
          git diff --staged --quiet || (git commit -m "Auto-generated swagger.json" && git push)